<header class="topbar">
  <button id="menu-toggle" class="icon-btn lg:hidden" type="button" aria-label="Abrir menú" aria-controls="sidebar" aria-expanded="false"><span class="material-symbols-outlined">menu</span></button>
  <div class="min-w-0 flex-1">
    <p class="text-xs font-semibold uppercase tracking-[.2em] text-primary">Panel administrativo</p>
    <h1 class="truncate font-display text-xl font-extrabold sm:text-2xl">{{ title }}</h1>
  </div>
  <div class="hidden max-w-sm flex-1 md:block">
    <label class="search-field"><span class="material-symbols-outlined">search</span><input id="global-search" type="search" placeholder="Buscar conciertos o ventas" aria-label="Buscar en LivePass"></label>
  </div>
  <button id="notification-button" class="icon-btn" type="button" aria-label="Ver notificaciones"><span class="material-symbols-outlined">notifications</span></button>
  <button id="theme-toggle" class="icon-btn" type="button" aria-label="Cambiar tema"><span class="material-symbols-outlined">light_mode</span></button>
</header>
